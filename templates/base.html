    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>{% block title %}Music App{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'style/base.css' %}">

            <svg viewBox="0 0 24 24">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </label>
        <span class="sidebar-brand">MUSIC APP</span>
    </div>

        <a href="{% url 'suggestions' %}" class="sidebar-nav-link"><i class="fa-solid fa-compass"></i> Suggestions</a>
        <a href="{% url 'user_playlists' %}" class="sidebar-nav-link"><i class="fa-solid fa-folder"></i> Playlists</a>
        <a href="{% url 'search' %}" class="sidebar-nav-link"><i class="fa-solid fa-music"></i> Catalog</a>
    </nav>
    <div class="sidebar-footer">

        <h1>MUSIC APP</h1>
    </div>

    <div class="nav-links" role="list">
        <a href="{% url 'suggestions' %}" class="ma-nav-link" role="listitem">Suggestions</a>
        <a href="{% url 'user_playlists' %}" class="ma-nav-link" role="listitem">Playlists</a>
        <a href="{% url 'search' %}" class="ma-nav-link" role="listitem">Catalog</a>
    </div>

    <div class="nav-right">
        <form method="POST" action="{% url 'logout' %}" class="logout-form m-0 p-0">
            {% csrf_token %}
            <button type="submit">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Log out</span>
            </button>
        </form>
    </div>

</nav>

{% block content %}{% endblock %}

<footer>
    <div class="play-song d-none justify-content-around align-items-center flex-wrap p-3">
        <div class="left-play-song d-flex align-items-center gap-3">
            <img class="result-image" src="" alt="Picture">
            <div class="song-detail">
                <h2></h2>
                <h3></h3>
            </div>
        </div>
        <audio id="audioPlayer" src="" controls controlsList="nodownload" data-track_id=""></audio>
    </div>
</footer>

<div id="playlist-alert" class="alert alert-success position-fixed bottom-0 end-0 m-3" role="alert">
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
<script src="{% static 'script/base.js' %}"></script>
</script>
{% block js %}{% endblock %}
</body>
</html>
